<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Office Hayashi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --black: #111111;
      --white: #ffffff;
      --gray-light: #f5f5f3;
      --gray-mid: #e0e0dc;
      --gray-text: #888880;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--white);
      color: var(--black);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── HEADER ── */
    header {
      padding: 56px 60px 0;
      opacity: 0;
      transform: translateY(-16px);
      animation: fadeUp 0.7s ease forwards 0.1s;
    }

    .logo img {
      height: clamp(80px, 12vw, 140px);
      width: auto;
      display: block;
    }

    /* ── MAIN ── */
    main {
      padding: 64px 60px 80px;
    }

    .profile-block {
      display: flex;
      align-items: flex-start;
      gap: 52px;
      max-width: 860px;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.7s ease forwards 0.35s;
    }

    .photo-wrap {
      flex-shrink: 0;
      width: clamp(130px, 18vw, 200px);
      height: clamp(130px, 18vw, 200px);
    }

    .photo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
      border-radius: 50%;
    }

    .bio {
      padding-top: 8px;
    }

    .bio p {
      font-size: clamp(13px, 1.6vw, 15px);
      font-weight: 300;
      line-height: 2.1;
      color: #333;
      letter-spacing: 0.03em;
    }

    /* ── DIVIDER ── */
    .divider {
      width: 48px;
      height: 1px;
      background: var(--gray-mid);
      margin: 52px 0 44px;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.55s;
    }

    /* ── CONTACT ICONS ── */
    .contact-row {
      display: flex;
      align-items: flex-end;
      gap: 32px;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.7s;
    }

    .contact-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: var(--black);
      cursor: pointer;
    }

    .contact-item:hover .icon-circle {
      background: var(--black);
    }

    .contact-item:hover .icon-circle svg {
      stroke: var(--white);
    }

    .icon-circle {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 1.5px solid var(--gray-mid);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.25s ease;
      background: var(--white);
    }

    .icon-circle svg {
      width: 22px;
      height: 22px;
      stroke: var(--black);
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: stroke 0.25s ease;
    }

    .contact-label {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.08em;
      color: var(--gray-text);
      text-transform: uppercase;
    }

    .contact-item.disabled {
      opacity: 0.3;
      cursor: default;
      pointer-events: none;
    }

    /* ── PHONE MODAL ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal-box {
      background: var(--white);
      padding: 44px 48px;
      max-width: 340px;
      width: 90%;
      text-align: center;
      animation: modalIn 0.25s ease;
    }

    @keyframes modalIn {
      from { transform: translateY(12px); opacity: 0; }
      to   { transform: translateY(0);   opacity: 1; }
    }

    .modal-box p.modal-label {
      font-size: 11px;
      letter-spacing: 0.12em;
      color: var(--gray-text);
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .modal-box .phone-number {
      font-size: 28px;
      font-weight: 300;
      letter-spacing: 0.1em;
      color: var(--black);
      margin-bottom: 32px;
    }

    .modal-buttons {
      display: flex;
      gap: 12px;
    }

    .btn-call {
      flex: 1;
      padding: 14px;
      background: var(--black);
      color: var(--white);
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.06em;
      border: none;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    .btn-call:hover { background: #333; }

    .btn-cancel {
      flex: 1;
      padding: 14px;
      background: transparent;
      color: var(--black);
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.06em;
      border: 1.5px solid var(--gray-mid);
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .btn-cancel:hover { border-color: #aaa; }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 640px) {
      header { padding: 40px 28px 0; }
      main   { padding: 48px 28px 64px; }

      .profile-block {
        flex-direction: column;
        gap: 32px;
        align-items: center;
      }

      .photo-wrap {
        width: 140px;
        height: 140px;
      }

      .bio { padding-top: 0; }
      .bio p { font-size: 14px; }
      .contact-row { gap: 20px; }
      .icon-circle { width: 50px; height: 50px; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">
      <img src="ロゴ.png" alt="Office Hayashi">
    </div>
  </header>

  <main>
    <div class="profile-block">
      <div class="photo-wrap">
        <img src="顔.png" alt="林功一">
      </div>
      <div class="bio">
        <p>
          チラシ・ポスター・看板など、販促物のデザインを承ります。<br>
          ECサイト運営12年、飲食チェーンのインハウスデザイナーとして9年。<br>
          飲食業界でのデザイン経験が長く、お店の繁盛に直結する販促物を一緒に考えます。<br>
          パソコン・スマホ・ウェブ周りのお困りごともお気軽にご相談ください。
        </p>
      </div>
    </div>

    <div class="divider"></div>

    <div class="contact-row">

      <!-- メール -->
      <a class="contact-item" href="mailto:mah02154@gmail.com" aria-label="メールを送る">
        <div class="icon-circle">
          <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="2,4 12,13 22,4"/></svg>
        </div>
        <span class="contact-label">Mail</span>
      </a>

      <!-- 電話 -->
      <div class="contact-item" onclick="openPhoneModal()" role="button" tabindex="0" aria-label="電話をかける">
        <div class="icon-circle">
          <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.07 12 19.79 19.79 0 0 1 1 3.18 2 2 0 0 1 2.98 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.09 8.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        </div>
        <span class="contact-label">Tel</span>
      </div>

      <!-- ポートフォリオ（準備中） -->
      <div class="contact-item disabled" aria-label="実績抜粋（準備中）">
        <div class="icon-circle">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg>
        </div>
        <span class="contact-label">Portfolio</span>
      </div>

    </div>
  </main>

  <!-- 電話モーダル -->
  <div class="modal-overlay" id="phoneModal" onclick="closeOnOverlay(event)">
    <div class="modal-box">
      <p class="modal-label">Tel</p>
      <div class="phone-number">080-3459-5131</div>
      <div class="modal-buttons">
        <a class="btn-call" href="tel:08034595131">発信する</a>
        <button class="btn-cancel" onclick="closePhoneModal()">キャンセル</button>
      </div>
    </div>
  </div>

  <script>
    function openPhoneModal() {
      document.getElementById('phoneModal').classList.add('open');
    }
    function closePhoneModal() {
      document.getElementById('phoneModal').classList.remove('open');
    }
    function closeOnOverlay(e) {
      if (e.target === document.getElementById('phoneModal')) closePhoneModal();
    }
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closePhoneModal();
    });
  </script>

</body>
</html>
